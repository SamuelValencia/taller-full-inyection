{% extends "base.html" %}{% block title %}Mi perfil{% endblock %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4"><h1 class="h3 fw-bold mb-0"><i class="fas fa-id-card me-2 text-primary"></i>Mi perfil</h1></div>
<div class="row g-3 justify-content-center"><div class="col-md-6">
<div class="card border-0 shadow-sm"><div class="card-body p-4">
<div class="text-center mb-3"><span class="badge {% if request.user.rol == 'ADMIN' %}bg-danger{% elif request.user.rol == 'MECANICO' %}bg-primary{% else %}bg-success{% endif %} fs-6">{{ request.user.get_rol_display }}</span></div>
<form method="post" enctype="multipart/form-data" novalidate>{% csrf_token %}
<div class="row g-3">
  {% for field in form %}
  <div class="col-md-6"><label class="form-label fw-semibold">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>
  {% endfor %}
</div>
<hr><button type="submit" class="btn btn-warning fw-semibold px-4 w-100"><i class="fas fa-save me-2"></i>Actualizar perfil</button>
</form>
</div></div></div></div>{% endblock %}
