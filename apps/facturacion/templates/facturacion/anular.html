{% extends "base.html" %}
{% block title %}Anular Factura{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm border-top border-danger border-3">
      <div class="card-body p-5 text-center">
        <i class="fas fa-ban fa-4x text-danger mb-3"></i>
        <h4 class="fw-bold">¿Anular la factura {{ factura.numero_factura }}?</h4>
        <p class="text-muted">Orden: {{ factura.orden.numero_orden }} — Total: ${{ factura.total|floatformat:2 }}</p>
        <form method="post" class="d-flex flex-column gap-3 mt-4">
          {% csrf_token %}
          {{ form.as_p }}
          <div class="d-flex justify-content-center gap-3">
            <button type="submit" class="btn btn-danger px-4"><i class="fas fa-ban me-2"></i>Anular Factura</button>
            <a href="{% url 'facturacion:detalle' factura.pk %}" class="btn btn-secondary px-4">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
