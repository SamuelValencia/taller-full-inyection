{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}

<div class="form-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3 fw-bold mb-0"><i class="fas fa-folder me-2 text-primary"></i>{{ titulo }}</h1>
      <a href="{% url 'inventario:lista_categorias' %}" class="btn btn-secondary"><i class="fas fa-arrow-left me-1"></i>Volver</a>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              {{ form.nombre }}
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Descripción</label>
              {{ form.descripcion }}
            </div>
            <div class="col-12">
              <div class="form-check">
                {{ form.activo }}
                <label class="form-check-label" for="{{ form.activo.id_for_label }}">Activo</label>
              </div>
            </div>
          </div>
          <hr>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary fw-semibold px-4"><i class="fas fa-save me-2"></i>Guardar</button>
            <a href="{% url 'inventario:lista_categorias' %}" class="btn btn-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
</div>
{% endblock %}
