<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Correo enviado | Fuel Injection</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>body{background:linear-gradient(135deg,#1a1a2e,#0f3460);min-height:100vh;display:flex;align-items:center;}</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card border-0 shadow-lg text-center" style="border-radius:1.5rem">
        <div class="card-body p-5">
          <i class="fas fa-envelope-open-text fa-4x text-success mb-3"></i>
          <h4 class="fw-bold">Revisa tu correo</h4>
          <p class="text-muted">
            Si existe una cuenta asociada a ese correo, recibirás un enlace para restablecer tu contraseña.<br>
            <span class="small">El enlace es válido por <strong>1 hora</strong>.</span>
          </p>
          <p class="text-muted small">Si no ves el correo, revisa tu carpeta de <strong>spam o correo no deseado</strong>.</p>
          <a href="{% url 'authentication:login' %}" class="btn btn-warning fw-bold mt-2">
            <i class="fas fa-arrow-left me-2"></i>Volver al inicio de sesión
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
