<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Recuperar contraseña | Taller Mecánico</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>body{background:linear-gradient(135deg,#1a1a2e,#0f3460);min-height:100vh;display:flex;align-items:center;}</style>
</head>
<body>
<div class="container"><div class="row justify-content-center"><div class="col-md-5 col-lg-4">
  <div class="card border-0 shadow-lg" style="border-radius:1.5rem">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="fas fa-key fa-3x text-warning mb-2"></i>
        <h4 class="fw-bold">Recuperar contraseña</h4>
        <p class="text-muted small">Ingresa tu correo y te enviaremos un enlace.</p>
      </div>
      <form method="post">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          {{ form.email }}
        </div>
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-warning fw-bold"><i class="fas fa-paper-plane me-2"></i>Enviar enlace</button>
        </div>
      </form>
      <div class="text-center"><a href="{% url 'authentication:login' %}" class="text-muted small"><i class="fas fa-arrow-left me-1"></i>Volver al login</a></div>
    </div>
  </div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
