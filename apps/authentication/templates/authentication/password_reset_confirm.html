<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><title>Nueva contraseña | Taller Mecánico</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<style>body{background:linear-gradient(135deg,#1a1a2e,#0f3460);min-height:100vh;display:flex;align-items:center;}</style>
</head><body><div class="container"><div class="row justify-content-center"><div class="col-md-5">
<div class="card border-0 shadow-lg p-5" style="border-radius:1.5rem">
<div class="text-center mb-4"><i class="fas fa-lock fa-3x text-warning mb-2"></i><h4 class="fw-bold">Nueva contraseña</h4></div>
<form method="post">{% csrf_token %}
{% for field in form %}
<div class="mb-3"><label class="form-label fw-semibold">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>
{% endfor %}
<div class="d-grid"><button type="submit" class="btn btn-warning fw-bold">Guardar contraseña</button></div>
</form></div></div></div></div></body></html>
