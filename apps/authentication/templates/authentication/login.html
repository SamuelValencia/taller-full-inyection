<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión | Taller Mecánico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display:flex; align-items:center; }
    .login-card { border-radius: 1.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
    .brand-icon { font-size: 3.5rem; color: #ffc107; }
    .btn-login { background: linear-gradient(135deg, #e84393, #e84393); border: none; }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .form-control:focus { border-color: #ffc107; box-shadow: 0 0 0 0.2rem rgba(255,193,7,.25); }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card login-card border-0">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="brand-icon mb-2"><i class="fas fa-wrench"></i></div>
              <h3 class="fw-bold">Taller Mecánico</h3>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger py-2">
              <i class="fas fa-exclamation-circle me-1"></i>
              Usuario o contraseña incorrectos.
            </div>
            {% endif %}

            <form method="post" novalidate>
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label fw-semibold">Usuario</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                  {{ form.username }}
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                  {{ form.password }}
                  <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                  </button>
                </div>
              </div>
              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-warning btn-lg fw-bold">
                  <i class="fas fa-sign-in-alt me-2"></i>Ingresar
                </button>
              </div>
              <div class="text-center">
                <a href="{% url 'authentication:password_reset' %}" class="text-muted small">
                  <i class="fas fa-key me-1"></i>¿Olvidaste tu contraseña?
                </a>
              </div>
            </form>
          </div>
        </div>
        <p class="text-center text-white-50 small mt-3">&copy; 2025 Taller Mecánico &mdash; Guayaquil, Ecuador</p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePwd').addEventListener('click', function() {
      const pwd = document.querySelector('input[name="password"]');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
      else { pwd.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
    });
  </script>
</body>
</html>
