{% extends "base.html" %}
{% block title %}Eliminar cliente{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
  <div class="card border-0 shadow-sm border-top border-danger border-3">
    <div class="card-body p-5 text-center">
      <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
      <h4 class="fw-bold">¿Eliminar cliente?</h4>
      <p class="text-muted">Estás por eliminar a <strong>{{ cliente.nombre_completo }}</strong>.<br>Esta acción desactivará al cliente del sistema.</p>
      <form method="post" class="d-flex justify-content-center gap-3 mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4"><i class="fas fa-trash me-2"></i>Sí, eliminar</button>
        <a href="{% url 'clientes:lista' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
