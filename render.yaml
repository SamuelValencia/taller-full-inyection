services:
  - type: web
    name: fuel-injection
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn fuel_injection.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: fuel_injection.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fuel-injection-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: fuel-injection.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://fuel-injection.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: fuel-injection-db
    databaseName: fuel_injection
    user: fuel_injection
    plan: free
